name: ubongo_solver
description: "Instantly solves physical Ubongo puzzle cards."
publish_to: 'none'
version: 1.2.0-beta.1+6

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  ubongo_core:
    path: ../packages/ubongo_core
  ubongo_vision:
    path: ../packages/ubongo_vision
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  image: ^4.5.4
  shared_preferences: ^2.3.4
  share_plus: ^13.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
